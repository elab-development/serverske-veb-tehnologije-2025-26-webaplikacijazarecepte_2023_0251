services:
  # MongoDB servis
  mongodb:
    image: mongo:4.4
    container_name: steh-recepti-mongodb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${MONGO_PORT}:27017"
    networks:
      - steh-recepti-network

  # Backend servis - Node.js/Express API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: steh-recepti-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
      MONGODB_URI: ${MONGODB_URI}
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${BACKEND_EXTERNAL_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend/src:/usr/src/app/src  # bind-mount za source kod u developmentu
    networks:
      - steh-recepti-network

  # Frontend servis - Angular aplikacija
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: steh-recepti-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - API_URL=${API_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    networks:
      - steh-recepti-network

# Mreže
networks:
  steh-recepti-network:
    driver: bridge
    name: steh-recepti-network

# Volumi
volumes:
  mongodb_data:
    name: steh-recepti-mongodb-data
